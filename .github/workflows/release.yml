name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release (for example v0.8.4)
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      TEAM_ID: 5YUPQC9D96
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Archive signed app
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            -scheme Octo \
            -configuration Release \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -archivePath "$RUNNER_TEMP/Octo.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export app
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
            <key>teamID</key><string>${TEAM_ID}</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Octo.xcarchive" \
            -exportPath "$RUNNER_TEMP/Octo-export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$APPLE_API_KEY_CONTENT"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize app
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "$RUNNER_TEMP/Octo-export/Octo.app" "$RUNNER_TEMP/Octo-notarization.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Octo-notarization.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/Octo-export/Octo.app"

      - name: Package release assets
        id: package
        env:
          INPUT_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$RUNNER_TEMP/Octo-export/Octo.app/Contents/Info.plist")
          TAG="$INPUT_TAG"
          if [ "$VERSION" != "${TAG#v}" ]; then
            echo "Tag $TAG does not match app version $VERSION" >&2
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --keepParent "$RUNNER_TEMP/Octo-export/Octo.app" "dist/Octo-$VERSION.zip"
          hdiutil create -volname "Octo $VERSION" -srcfolder "$RUNNER_TEMP/Octo-export/Octo.app" -ov -format UDZO "dist/Octo-$VERSION.dmg"
          xcrun notarytool submit "dist/Octo-$VERSION.dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "dist/Octo-$VERSION.dmg"
          xcrun stapler validate "dist/Octo-$VERSION.dmg"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="$INPUT_TAG"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "dist/Octo-${{ steps.package.outputs.version }}.dmg" \
              "dist/Octo-${{ steps.package.outputs.version }}.zip"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Octo ${{ steps.package.outputs.version }}" \
              --generate-notes \
              "dist/Octo-${{ steps.package.outputs.version }}.dmg" \
              "dist/Octo-${{ steps.package.outputs.version }}.zip"
          fi

      - name: Generate signed Sparkle appcast
        env:
          INPUT_TAG: ${{ inputs.tag || github.ref_name }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SPARKLE_PRIVATE_KEY"
          GENERATE_APPCAST=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Sparkle/bin/generate_appcast' -type f -print -quit)
          test -n "$GENERATE_APPCAST"
          mkdir update-site
          if ! curl --fail --location --output update-site/appcast.xml \
            https://blackforestboi.github.io/Octo/appcast.xml; then
            cp docs/updates/appcast.xml update-site/appcast.xml
          fi
          cp "dist/Octo-${{ steps.package.outputs.version }}.dmg" update-site/
          PRIVATE_KEY=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | python3 -c 'import re, sys; value = sys.stdin.read().strip(); match = re.search(r"-----BEGIN [^-]+-----(.*?)-----END [^-]+-----", value, re.DOTALL); print("".join((match.group(1) if match else value).split()))')
          test -n "$PRIVATE_KEY"
          printf '%s' "$PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$INPUT_TAG/" \
            --maximum-versions 0 \
            --maximum-deltas 0 \
            -o update-site/appcast.xml \
            update-site

      - name: Upload update feed
        uses: actions/upload-pages-artifact@v3
        with:
          path: update-site

      - name: Publish update feed
        id: deployment
        uses: actions/deploy-pages@v4
