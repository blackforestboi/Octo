name: Publish Initial Update Feed

on:
  push:
    branches:
      - main
    paths:
      - docs/updates/appcast.xml
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/updates
      - id: deployment
        uses: actions/deploy-pages@v4
